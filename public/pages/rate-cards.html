<div class="p-5 sm:p-8 space-y-6 fade-in">

  <!-- Header with actions -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div><!-- Title handled by shell --></div>
    <div class="flex flex-wrap gap-2">
      <button onclick="downloadFile('/api/rate-cards/export', 'RateCards_Export.xlsx')" class="btn-secondary inline-flex items-center gap-1.5">
        <span class="material-symbols-outlined text-base">download</span>Export
      </button>
      <button class="btn-secondary inline-flex items-center gap-1.5" onclick="openUploadRCModal()">
        <span class="material-symbols-outlined text-base">upload</span>Upload Excel
      </button>
      <button class="btn-primary inline-flex items-center gap-2" onclick="window.rcEdit=null;openRCModal()">
        <span class="material-symbols-outlined text-lg">add</span>Add Rate Card
      </button>
    </div>
  </div>

  <!-- Filter & Search -->
  <div class="stat-card !p-4">
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-on-surface-variant text-lg">filter_list</span>
        <label class="text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Client:</label>
        <select id="rcFilterClient" class="w-auto">
          <option value="">All Clients</option>
        </select>
      </div>
      <div class="flex items-center gap-3 sm:ml-auto w-full sm:w-auto max-w-sm">
        <span class="material-symbols-outlined text-on-surface-variant">search</span>
        <input type="text" id="rcSearch" placeholder="Search rate cards..." class="flex-1">
      </div>
    </div>
  </div>

  <!-- Rate Cards Table -->
  <div class="stat-card !p-0 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="stitch-table" id="rcTable">
        <thead>
          <tr>
            <th class="sortable" data-sort-key="0">Client</th>
            <th class="sortable" data-sort-key="1">Emp Code</th>
            <th class="sortable" data-sort-key="2">Name</th>
            <th class="sortable" data-sort-key="3" data-sort-type="date">DOJ</th>
            <th class="sortable" data-sort-key="4">Manager</th>
            <th class="sortable text-right" data-sort-key="5" data-sort-type="currency">Monthly Rate</th>
            <th class="sortable text-center" data-sort-key="6" data-sort-type="number">Leaves</th>
            <th class="sortable" data-sort-key="7">SOW#</th>
            <th class="sortable" data-sort-key="8" data-sort-type="date">Date of Reporting</th>
            <th class="sortable" data-sort-key="9">PO#</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="rcBody">
          <tr><td colspan="11"><div class="loading-spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Rate Card Modal -->
<div id="rcModal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-surface-container-high rounded-2xl w-full max-w-lg mx-4 border border-outline-variant/15 shadow-2xl max-h-[90vh] overflow-y-auto styled-scrollbar">
    <form id="rcForm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/8">
        <h5 class="font-headline font-bold text-lg text-on-surface" id="rcModalTitle">Add Rate Card</h5>
        <button type="button" onclick="closeRCModal()" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="rcId">
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Client *</label>
          <select id="rcClient" required><option value="">Select Client</option></select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Emp Code *</label>
            <input type="text" id="rcEmpCode" required>
          </div>
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Emp Name *</label>
            <input type="text" id="rcEmpName" required>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">SOW *</label>
            <select id="rcSOW" required><option value="">Select SOW</option></select>
          </div>
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">DOJ</label>
            <input type="date" id="rcDoj">
          </div>
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Reporting Manager</label>
            <input type="text" id="rcManager">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Rate Entry Mode</label>
            <select id="rcRateMode">
              <option value="monthly">Monthly Rate</option>
              <option value="hourly">Hourly Rate</option>
            </select>
          </div>
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Leaves Allowed</label>
            <input type="number" id="rcLeaves" value="0" min="0">
          </div>
        </div>
        <div id="rcMonthlyRateSection">
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Monthly Rate *</label>
          <input type="number" id="rcRate" step="0.01" min="0.01" required>
        </div>
        <div id="rcHourlyRateSection" class="hidden grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Hourly Rate *</label>
            <input type="number" id="rcHourlyRate" step="0.01" min="0.01">
          </div>
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Hours Worked In Month *</label>
            <input type="number" id="rcHoursWorked" step="0.01" min="0.01">
          </div>
        </div>
        <div id="rcHourlyComputedSection" class="hidden rounded-xl border border-outline-variant/15 bg-surface-container p-4">
          <div class="text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1">Computed Monthly Rate</div>
          <div id="rcComputedMonthlyRate" class="text-lg font-bold text-on-surface">&#8377;0.00</div>
        </div>
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Date of Reporting</label>
          <input type="date" id="rcChargingDate">
        </div>
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Purchase Order</label>
          <select id="rcPO"><option value="">Select PO</option></select>
        </div>
        <div id="rcSowPreview" class="hidden rounded-xl border border-outline-variant/15 bg-surface-container p-4">
          <h6 class="section-label mb-3">SOW Preview</h6>
          <div id="rcSowPreviewContent" class="text-sm text-on-surface-variant"></div>
        </div>
      </div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/8">
        <button type="button" class="btn-secondary" onclick="closeRCModal()">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Upload Rate Card Modal -->
<div id="uploadRCModal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-surface-container-high rounded-2xl w-full max-w-lg mx-4 border border-outline-variant/15 shadow-2xl">
    <form id="uploadRCForm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/8">
        <h5 class="font-headline font-bold text-lg text-on-surface">Upload Rate Card Excel</h5>
        <button type="button" onclick="closeUploadRCModal()" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Client *</label>
          <select id="uploadRCClient" required><option value="">Select Client</option></select>
        </div>
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Excel File *</label>
          <input type="file" id="uploadRCFile" accept=".xlsx,.xls" required>
        </div>
      </div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/8">
        <button type="button" class="btn-secondary" onclick="closeUploadRCModal()">Cancel</button>
        <button type="submit" class="btn-primary">Upload</button>
      </div>
    </form>
  </div>
</div>

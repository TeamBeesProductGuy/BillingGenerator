<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-primary-container shadow-lg shadow-primary-container/20 mb-4">
                <span class="material-symbols-outlined text-on-primary-fixed text-3xl" style="font-variation-settings: 'FILL' 1">hive</span>
            </div>
            <h1 class="font-headline font-bold text-2xl text-on-surface">TeamBees Billing</h1>
            <p class="text-on-surface-variant text-sm mt-1">Sign in to your account</p>
        </div>

        <!-- Login Card -->
        <div class="bg-surface-container rounded-2xl p-8 border border-outline-variant/10 shadow-2xl">
            <!-- Tab Switcher -->
            <div class="flex gap-2 mb-6 bg-surface-container-high rounded-xl p-1">
                <button id="tabLogin" onclick="switchAuthTab('login')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all bg-primary text-on-primary-fixed">Sign In</button>
                <button id="tabSignup" onclick="switchAuthTab('signup')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all text-on-surface-variant hover:text-on-surface">Sign Up</button>
            </div>

            <!-- Error Display -->
            <div id="authError" class="hidden mb-4 p-3 rounded-xl bg-error-container/20 border border-error/20 text-error text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">error</span>
                <span id="authErrorText"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2">Email</label>
                        <input id="loginEmail" type="email" required placeholder="you@company.com"
                            class="w-full bg-surface-container-high border border-outline-variant/20 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2">Password</label>
                        <input id="loginPassword" type="password" required placeholder="Enter your password"
                            class="w-full bg-surface-container-high border border-outline-variant/20 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full mt-6 bg-gradient-to-r from-primary-container to-primary text-on-primary-fixed font-bold py-3 rounded-xl shadow-lg shadow-primary-container/20 hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-xl">login</span>
                    Sign In
                </button>
            </form>

            <!-- Signup Form (hidden) -->
            <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2">Email</label>
                        <input id="signupEmail" type="email" required placeholder="you@company.com"
                            class="w-full bg-surface-container-high border border-outline-variant/20 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2">Password</label>
                        <input id="signupPassword" type="password" required minlength="6" placeholder="Minimum 6 characters"
                            class="w-full bg-surface-container-high border border-outline-variant/20 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2">Confirm Password</label>
                        <input id="signupPasswordConfirm" type="password" required minlength="6" placeholder="Re-enter password"
                            class="w-full bg-surface-container-high border border-outline-variant/20 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                </div>
                <button type="submit" id="signupBtn" class="w-full mt-6 bg-gradient-to-r from-primary-container to-primary text-on-primary-fixed font-bold py-3 rounded-xl shadow-lg shadow-primary-container/20 hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-xl">person_add</span>
                    Create Account
                </button>
            </form>
        </div>

        <p class="text-center text-on-surface-variant text-xs mt-6">TeamBees Billing Engine v1.0</p>
    </div>
</div>

<div class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Ambient glow behind card -->
    <div
        class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/[0.06] rounded-full blur-[150px] pointer-events-none">
    </div>

    <div class="w-full max-w-[400px] relative">
        <!-- Logo -->
        <div class="text-center mb-8">
            <img src="/images/TeamBeesLOgo.png" alt="TeamBees" class="h-16 w-auto object-contain mx-auto mb-5">
            <h1 class="font-headline font-bold text-2xl text-text-primary">Welcome</h1>
            <p class="text-text-muted text-[13px] mt-1">Sign in to your billing engine</p>
        </div>

        <!-- Login Card -->
        <div
            class="stat-card !p-7 !rounded-2xl !border !border-black !bg-white shadow-[0_16px_40px_rgba(15,23,42,0.10),0_4px_12px_rgba(15,23,42,0.08)]">
            <!-- Error Display -->
            <div id="authError"
                class="hidden mb-4 p-3 rounded-xl bg-error/5 border border-error/10 text-error text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">error</span>
                <span id="authErrorText"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label
                            class="block text-[11px] font-semibold text-text-muted uppercase tracking-[0.15em] mb-2">Email</label>
                        <input id="loginEmail" type="email" required placeholder="you@company.com"
                            class="w-full !rounded-2xl !border-black !bg-white !text-black placeholder:!text-black/50 focus:!border-black focus:!shadow-[0_0_0_3px_rgba(0,0,0,0.08)]">
                    </div>
                    <div>
                        <label
                            class="block text-[11px] font-semibold text-text-muted uppercase tracking-[0.15em] mb-2">Password</label>
                        <input id="loginPassword" type="password" required placeholder="Enter your password"
                            class="w-full !rounded-2xl !border-black !bg-white !text-black placeholder:!text-black/50 focus:!border-black focus:!shadow-[0_0_0_3px_rgba(0,0,0,0.08)]">
                    </div>
                </div>
                <button type="submit" id="loginBtn"
                    class="btn-primary w-full mt-6 py-3 flex items-center justify-center gap-2 !rounded-xl !text-sm">
                    <span class="material-symbols-outlined text-lg">login</span>
                    Sign In
                </button>
            </form>

            <div
                class="mt-5 rounded-xl border border-border bg-surface-muted p-4 text-xs leading-relaxed text-text-muted">
                New accounts are provisioned only through Admin access.
            </div>
        </div>

        <p class="text-center text-text-muted/60 text-[10px] mt-6 tracking-widest uppercase">Powered by TeamBees</p>
    </div>
</div>

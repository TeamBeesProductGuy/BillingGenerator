<div class="p-5 sm:p-8 space-y-6 fade-in">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div></div>
    <button class="btn-secondary inline-flex items-center gap-2" onclick="reloadReminders()">
      <span class="material-symbols-outlined text-lg">refresh</span>Refresh
    </button>
  </div>

  <div class="stat-card !p-4">
    <div class="flex items-center gap-3 max-w-md">
      <span class="material-symbols-outlined text-on-surface-variant">search</span>
      <input type="text" id="remindersSearch" placeholder="Search reminders..." class="flex-1">
    </div>
  </div>

  <div class="stat-card !p-0 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="stitch-table" id="remindersTable">
        <thead>
          <tr>
            <th class="sortable" data-sort-key="0">Due Date</th>
            <th class="sortable" data-sort-key="1">Client</th>
            <th class="sortable" data-sort-key="2">Candidate</th>
            <th class="sortable" data-sort-key="3">Role</th>
            <th class="sortable text-right" data-sort-key="4" data-sort-type="currency">Bill Amount</th>
            <th>Payment Status</th>
            <th>Invoice Status</th>
            <th>Primary Email</th>
            <th>Secondary Email</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="remindersBody">
          <tr><td colspan="10"><div class="loading-spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="reminderActionModal" class="fixed inset-0 z-[220] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-surface-container-high rounded-2xl w-full max-w-md mx-4 border border-outline-variant/15 shadow-2xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/8">
      <h5 class="font-headline font-bold text-lg text-on-surface" id="reminderActionTitle">Reminder Actions</h5>
      <button type="button" onclick="closeReminderActions()" class="text-on-surface-variant hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-4">
      <div id="reminderActionList" class="space-y-2"></div>
    </div>
  </div>
</div>

<div id="reminderEmailModal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-surface-container-high rounded-2xl w-full max-w-lg mx-4 border border-outline-variant/15 shadow-2xl">
    <form id="reminderEmailForm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/8">
        <h5 class="font-headline font-bold text-lg text-on-surface">Edit Reminder Emails</h5>
        <button type="button" onclick="closeReminderEmailModal()" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="reminderEmailReminderId">
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Primary Email</label>
          <input type="email" id="reminderEmailPrimary" placeholder="Enter primary recipient email">
        </div>
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Secondary Email</label>
          <input type="email" id="reminderEmailSecondary" placeholder="Enter secondary recipient email">
        </div>
      </div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/8">
        <button type="button" class="btn-secondary" onclick="closeReminderEmailModal()">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<div id="extendReminderModal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-surface-container-high rounded-2xl w-full max-w-sm mx-4 border border-outline-variant/15 shadow-2xl">
    <form id="extendReminderForm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/8">
        <h5 class="font-headline font-bold text-lg text-on-surface">Extend Reminder</h5>
        <button type="button" onclick="closeExtendReminderModal()" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="extendReminderId">
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">New Reminder Date *</label>
          <input type="date" id="extendReminderDate" required>
        </div>
      </div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/8">
        <button type="button" class="btn-secondary" onclick="closeExtendReminderModal()">Cancel</button>
        <button type="submit" class="btn-primary">Extend</button>
      </div>
    </form>
  </div>
</div>

<div id="invoiceSentModal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-surface-container-high rounded-2xl w-full max-w-sm mx-4 border border-outline-variant/15 shadow-2xl">
    <form id="invoiceSentForm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/8">
        <h5 class="font-headline font-bold text-lg text-on-surface">Invoice Sent</h5>
        <button type="button" onclick="closeInvoiceSentModal()" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="invoiceSentReminderId">
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Invoice No. *</label>
          <input type="text" id="invoiceNumber" required>
        </div>
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Invoice Date *</label>
          <input type="date" id="invoiceDate" required>
        </div>
      </div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/8">
        <button type="button" class="btn-secondary" onclick="closeInvoiceSentModal()">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

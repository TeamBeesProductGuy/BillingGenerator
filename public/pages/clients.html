<div class="p-5 sm:p-8 space-y-6 fade-in">
  <div class="client-board-hero">
    <div class="page-hero-copy">
      <p class="page-hero-eyebrow">Client Directory</p>
    </div>
    <button class="btn-primary inline-flex items-center gap-2" onclick="window.clientEdit=null;openClientModal()">
      <span class="material-symbols-outlined text-lg">add</span>Add Client
    </button>
  </div>

  <div id="clientsSummary" class="grid gap-4 md:grid-cols-2">
    <div class="client-summary-card client-summary-card-permanent">
      <div class="client-summary-label">Permanent Clients</div>
      <div class="client-summary-value">0</div>
    </div>
    <div class="client-summary-card client-summary-card-contractual">
      <div class="client-summary-label">Contractual Clients</div>
      <div class="client-summary-value">0</div>
    </div>
  </div>

  <div class="stat-card !p-4">
    <div class="flex items-center gap-3 max-w-md">
      <span class="material-symbols-outlined text-on-surface-variant">search</span>
      <input type="text" id="clientsSearch" placeholder="Search clients..." class="flex-1">
    </div>
  </div>

  <div id="clientsBoard" class="space-y-6">
    <div class="stat-card !p-0 overflow-hidden">
      <div class="p-6"><div class="loading-spinner"></div></div>
    </div>
  </div>
</div>

<div id="clientModal" class="fixed inset-0 z-[200] hidden items-start justify-center bg-black/60 backdrop-blur-sm px-3 py-4 sm:px-5 sm:py-6">
  <div class="client-modal-shell">
    <form id="clientForm" class="client-modal-form">
      <div class="client-modal-header">
        <h5 class="client-modal-title" id="clientModalTitle">Add Client</h5>
        <button type="button" onclick="closeClientModal()" class="client-modal-close" aria-label="Close client modal">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="client-modal-body styled-scrollbar">
        <input type="hidden" id="clientId">
        <input type="hidden" id="clientEntityType" value="Contractual">

        <section class="client-form-section">
          <div class="client-form-section-header">
            <span class="client-form-section-icon material-symbols-outlined">badge</span>
            <h6>Basic Info</h6>
          </div>
          <div class="client-form-grid">
            <div class="client-field">
              <label for="contractType">Contract Type <span>*</span></label>
              <select id="contractType" required>
                <option value="Contractual">Contractual</option>
                <option value="Permanent">Permanent</option>
              </select>
            </div>
            <div class="client-field client-contractual-only">
              <label for="clientName">Client Name <span>*</span></label>
              <input type="text" id="clientName" placeholder="Enter client name">
            </div>
            <div class="client-field client-contractual-only">
              <label for="clientAbbreviation">Abbreviation <span>*</span></label>
              <input type="text" id="clientAbbreviation" placeholder="e.g. NTT" required>
            </div>
            <div class="client-field client-permanent-only hidden">
              <label for="permanentClientName">Name <span>*</span></label>
              <input type="text" id="permanentClientName" placeholder="Enter client name">
            </div>
            <div class="client-field client-permanent-only hidden">
              <label for="permanentClientAbbreviation">Abbreviation <span>*</span></label>
              <input type="text" id="permanentClientAbbreviation" placeholder="Used for search">
            </div>
          </div>
        </section>

        <div id="contractualFields" class="client-modal-sections">
          <section class="client-form-section">
            <div class="client-form-section-header">
              <span class="client-form-section-icon material-symbols-outlined">contact_mail</span>
              <h6>Contact Details</h6>
            </div>
            <div class="client-form-grid">
              <div class="client-field">
                <label for="contactPerson">Contact Person</label>
                <input type="text" id="contactPerson" placeholder="Enter contact person">
              </div>
              <div class="client-field">
                <label for="clientEmail">Email</label>
                <input type="email" id="clientEmail" placeholder="Enter email address">
              </div>
              <div class="client-field client-field-wide">
                <label for="clientPhone">Phone</label>
                <div class="client-phone-field-grid">
                  <select id="clientPhoneCountryCode" aria-label="Phone country code">
                    <option value="+91">+91 (India)</option>
                    <option value="+1">+1 (US/CA)</option>
                    <option value="+44">+44 (UK)</option>
                    <option value="+61">+61 (Australia)</option>
                    <option value="+65">+65 (Singapore)</option>
                    <option value="+971">+971 (UAE)</option>
                  </select>
                  <input type="text" id="clientPhone" class="client-phone-input" placeholder="Enter phone number">
                </div>
              </div>
            </div>
          </section>

          <section class="client-form-section">
            <div class="client-form-section-header">
              <span class="client-form-section-icon material-symbols-outlined">business_center</span>
              <h6>Business Details</h6>
            </div>
            <div class="client-form-grid">
              <div class="client-field">
                <label for="clientIndustry">Industry</label>
                <input type="text" id="clientIndustry" placeholder="e.g. IT Services, Healthcare...">
              </div>
              <div class="client-field">
                <label for="clientLeavesAllowed">Default Leaves Allowed</label>
                <input type="number" id="clientLeavesAllowed" min="0" step="1" value="0">
              </div>
            </div>
          </section>

          <section class="client-form-section">
            <div class="client-form-section-header">
              <span class="client-form-section-icon material-symbols-outlined">location_on</span>
              <h6>Address</h6>
            </div>
            <div class="client-form-grid">
              <div class="client-field">
                <label for="clientAddressLine1">Address Line 1</label>
                <input type="text" id="clientAddressLine1" placeholder="Enter address line 1">
              </div>
              <div class="client-field">
                <label for="clientAddressLine2">Address Line 2</label>
                <input type="text" id="clientAddressLine2" placeholder="Enter address line 2">
              </div>
              <div class="client-field">
                <label for="clientAddressCity">City / District <span>*</span></label>
                <input type="text" id="clientAddressCity" placeholder="Enter city or district">
              </div>
              <div class="client-field">
                <label for="clientAddressState">State <span>*</span></label>
                <input type="text" id="clientAddressState" placeholder="Enter state">
              </div>
              <div class="client-field">
                <label for="clientAddressPincode">Pincode</label>
                <input type="text" id="clientAddressPincode" placeholder="Enter pincode">
              </div>
            </div>
          </section>
        </div>

        <div id="permanentFields" class="hidden client-modal-sections">
          <div class="space-y-4">
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Address *</label>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">Address Line 1</label>
                <input type="text" id="permanentClientAddressLine1">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">Address Line 2</label>
                <input type="text" id="permanentClientAddressLine2">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">City / District *</label>
                <input type="text" id="permanentClientAddressCity">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">State *</label>
                <input type="text" id="permanentClientAddressState">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">Pincode</label>
                <input type="text" id="permanentClientAddressPincode">
              </div>
            </div>
          </div>
          <div>
            <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Billing Address</label>
            <label class="inline-flex items-center gap-2 mb-3 text-sm text-on-surface-variant">
              <input type="checkbox" id="permanentBillingSameAsAddress" checked>
              <span>Same as address</span>
            </label>
            <div id="permanentBillingAddressFields" class="grid grid-cols-1 sm:grid-cols-2 gap-4 hidden">
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">Address Line 1</label>
                <input type="text" id="permanentClientBillingAddressLine1">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">Address Line 2</label>
                <input type="text" id="permanentClientBillingAddressLine2">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">City / District *</label>
                <input type="text" id="permanentClientBillingAddressCity">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">State *</label>
                <input type="text" id="permanentClientBillingAddressState">
              </div>
              <div>
                <label class="block text-[11px] text-on-surface-variant mb-1">Pincode</label>
                <input type="text" id="permanentClientBillingAddressPincode">
              </div>
            </div>
          </div>

          <div class="stat-card !p-4 !bg-surface-muted !border-border">
            <div class="flex items-center justify-between mb-3">
              <h6 class="section-label !mb-0">Contact Person(s)</h6>
              <button type="button" class="btn-secondary btn-sm inline-flex items-center gap-1" onclick="addPermanentContactRow()">
                <span class="material-symbols-outlined text-base">add</span>Add Contact
              </button>
            </div>
            <div id="permanentContactsList" class="space-y-3"></div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Invoice Due In *</label>
              <select id="permanentBillingPattern">
                <option value="Immediate">Immediate</option>
                <option value="7 days">7 days</option>
                <option value="30 days">30 days</option>
                <option value="60 days">60 days</option>
                <option value="90 days">90 days</option>
              </select>
            </div>
            <div>
              <label class="block text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant mb-1.5">Billing Rate (% of CTC) *</label>
              <input type="number" id="permanentBillingRate" min="0.01" max="100" step="0.01">
            </div>
          </div>
        </div>
      </div>
      <div class="client-modal-footer">
        <button type="button" class="btn-secondary client-modal-cancel" onclick="closeClientModal()">Cancel</button>
        <button type="submit" class="btn-primary client-modal-save">
          <span class="material-symbols-outlined text-base">save</span>
          Save
        </button>
      </div>
    </form>
  </div>
</div>
